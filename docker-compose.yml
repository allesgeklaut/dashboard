services:
  homelab-ctrl:
    build: .
    container_name: homelab-ctrl
    restart: unless-stopped
    network_mode: host        # required — psutil reads host network stats
    pid: host                 # required — psutil reads host CPU / process list
    privileged: false
    environment:
      - TZ=Europe/Vienna
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro           # CLI fallback
      - /mnt/nas:/mnt/nas:ro                                   # NFS mounts visible
    env_file: .env
