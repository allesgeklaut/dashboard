<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HOMELAB//CTRL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0a0a;
  --bg-card:   #0e0e0e;
  --bg-sel:    rgba(0,204,68,0.07);
  --g:         #00cc44;
  --g-bright:  #00ff55;
  --g-dim:     rgba(0,204,68,0.45);
  --g-faint:   rgba(0,204,68,0.12);
  --border:    rgba(0,204,68,0.18);
  --border-hi: rgba(0,204,68,0.55);
  --red:       #ff4040;
  --red-dim:   rgba(255,64,64,0.55);
  --yellow:    #ffaa00;
  --blue:      #44aaff;
  --font:      'JetBrains Mono', 'Fira Code', monospace;
  --hdr-h:     48px;
  --bar-h:     60px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-text-size-adjust:none; scroll-behavior:smooth; }
body {
  background:var(--bg);
  color:var(--g);
  font-family:var(--font);
  font-size:13px;
  line-height:1.5;
  min-height:100dvh;
  padding-top:var(--hdr-h);
  padding-bottom:calc(var(--bar-h) + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
}
button { cursor:pointer; font-family:var(--font); }
/* ── scrollbar ── */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── HEADER ── */
header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:var(--hdr-h);
  background:rgba(10,10,10,0.95);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
  display:flex; align-items:center;
  padding:0 12px;
  gap:10px;
}
.logo {
  font-size:14px; font-weight:700; letter-spacing:0.04em;
  color:var(--g-bright); flex-shrink:0;
}
.logo span { color:var(--g-dim); }
.hdr-meta { display:flex; gap:8px; margin-left:auto; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
.hdr-chip {
  font-size:11px; color:var(--g-dim);
  border:1px solid var(--g-faint);
  padding:1px 6px; border-radius:2px;
}
#hdr-time { color:var(--g); font-weight:500; }
#hdr-up   { display:none; }
@media(min-width:480px){ #hdr-up { display:inline; } }

/* ── CONTENT ── */
main { padding:10px 10px 4px; max-width:900px; margin:0 auto; }

/* ── SECTION LABEL ── */
.sec-label {
  font-size:10px; font-weight:700; letter-spacing:0.12em;
  color:var(--g-dim); text-transform:uppercase;
  margin:14px 0 6px; display:flex; align-items:center; gap:8px;
}
.sec-label::after {
  content:''; flex:1; height:1px; background:var(--g-faint);
}

/* ── STAT GRID ── */
.stat-grid {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:6px;
}
@media(min-width:560px){ .stat-grid { grid-template-columns:repeat(3, 1fr); } }
@media(min-width:800px){ .stat-grid { grid-template-columns:repeat(6, 1fr); } }

.stat-card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:3px;
  padding:8px 10px;
}
.stat-label { font-size:10px; color:var(--g-dim); letter-spacing:0.08em; }
.stat-val {
  font-size:18px; font-weight:700; color:var(--g-bright);
  line-height:1.2; margin:2px 0 4px;
}
.stat-val.warn  { color:var(--yellow); }
.stat-val.alert { color:var(--red); }
.stat-sub { font-size:10px; color:var(--g-dim); }

/* ── PROGRESS BAR ── */
.pbar {
  height:3px; border-radius:2px;
  background:var(--g-faint);
  margin-top:5px; overflow:hidden;
}
.pbar-fill {
  height:100%; border-radius:2px;
  transition:width 0.6s ease, background-color 0.3s;
  background:var(--g);
}
.pbar-fill.warn  { background:var(--yellow); }
.pbar-fill.alert { background:var(--red); }

/* ── NET ROW ── */
.net-row {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:3px; padding:8px 10px;
  display:grid; grid-template-columns:1fr 1fr;
  gap:4px;
}
.net-item { display:flex; flex-direction:column; }
.net-label { font-size:10px; color:var(--g-dim); letter-spacing:0.06em; }
.net-val { font-size:15px; font-weight:600; color:var(--g); }
.net-arrow { color:var(--g-dim); margin-right:3px; }

/* ── ADGUARD ROW ── */
.ag-row {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:3px; padding:8px 10px;
  display:flex; gap:16px; flex-wrap:wrap;
}
.ag-item { display:flex; flex-direction:column; }
.ag-label { font-size:10px; color:var(--g-dim); }
.ag-val { font-size:15px; font-weight:600; color:var(--g); }


/* ── SHELLY PLUG ROW ── */
.shelly-row {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:3px; padding:8px 10px;
  display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start;
}
.shelly-power { display:flex; flex-direction:column; min-width:90px; }
.shelly-power .pbar { margin-top:6px; width:100%; }


/* ── POWER CYCLE BUTTON ── */
.btn-cycle {
  margin-top: 8px;
  padding: 5px 14px;
  background: #001a00; color: var(--g); border: 1px solid #004400;
  border-radius: 3px; cursor: pointer; font: inherit;
  font-size: var(--text-xs); letter-spacing: 0.05em; 
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn-cycle:hover  { background: #002800; border-color: var(--g); }
.btn-cycle.armed  { background: #220000; color: #ff4444; border-color: #880000; animation: pulse-red 0.6s ease-in-out infinite alternate; }
.btn-cycle:disabled { opacity: 0.5; cursor: not-allowed; }
@keyframes pulse-red { from { border-color: #880000; } to { border-color: #ff4444; } }


/* ── SHELLY 2 TOGGLE BUTTON ── */
.btn-cycle2 {
  margin-top: 8px;
  padding: 5px 14px;
  background: #001a00; color: var(--g); border: 1px solid #004400;
  border-radius: 3px; cursor: pointer; font: inherit;
  font-size: var(--text-xs); letter-spacing: 0.05em; 
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn-cycle2:hover     { background: #002800; border-color: var(--g); }
.btn-cycle2.armed  { background: #220000; color: #ff4444; border-color: #880000; animation: pulse-red 0.6s ease-in-out infinite alternate; }
.btn-cycle2:disabled  { opacity: 0.5; cursor: not-allowed; }

/* ── STORAGE ROWS ── */
.stor-list { display:flex; flex-direction:column; gap:5px; }
.stor-row {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:3px; padding:7px 10px;
}
.stor-top {
  display:flex; justify-content:space-between; align-items:baseline;
  margin-bottom:4px;
}
.stor-mount { font-size:11px; color:var(--g); }
.stor-info  { font-size:10px; color:var(--g-dim); }
.stor-error { font-size:11px; color:var(--red); }

/* ── CONTAINER LIST ── */
.ctr-filter {
  display:flex; gap:5px; margin-bottom:6px; flex-wrap:wrap;
}
.filter-btn {
  font-family:var(--font); font-size:10px; letter-spacing:0.06em;
  padding:3px 8px; border-radius:2px; border:1px solid var(--border);
  background:transparent; color:var(--g-dim);
  transition:all 0.15s;
}
.filter-btn.active {
  background:var(--g-faint); color:var(--g); border-color:var(--border-hi);
}
.filter-btn:active { opacity:0.7; }

.ctr-list { display:flex; flex-direction:column; gap:5px; }

.ctr-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:3px; padding:9px 12px;
  cursor:pointer; user-select:none;
  transition:border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color:transparent;
  display:flex; align-items:center; gap:10px;
}
.ctr-card:active { opacity:0.8; }
.ctr-card.selected {
  background:var(--bg-sel);
  border-color:var(--border-hi);
}
.ctr-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
  box-shadow:0 0 6px currentColor;
}
.ctr-dot.running { color:var(--g);      background:var(--g); }
.ctr-dot.exited  { color:var(--red);    background:var(--red); }
.ctr-dot.paused  { color:var(--yellow); background:var(--yellow); }
.ctr-dot.created { color:var(--blue);   background:var(--blue); }
.ctr-dot.restarting { color:var(--yellow); background:var(--yellow);
  animation:pulse 0.8s ease-in-out infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.ctr-info { flex:1; min-width:0; }
.ctr-name {
  font-size:13px; font-weight:600; color:var(--g);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ctr-meta { font-size:10px; color:var(--g-dim); margin-top:1px; }
.ctr-badge {
  font-size:9px; letter-spacing:0.1em; font-weight:700;
  padding:2px 6px; border-radius:2px; flex-shrink:0;
  text-transform:uppercase;
}
.ctr-badge.running { background:rgba(0,204,68,0.12); color:var(--g); border:1px solid rgba(0,204,68,0.25); }
.ctr-badge.exited  { background:rgba(255,64,64,0.1);  color:var(--red); border:1px solid rgba(255,64,64,0.2); }
.ctr-badge.paused  { background:rgba(255,170,0,0.1);  color:var(--yellow); border:1px solid rgba(255,170,0,0.2); }
.ctr-badge.created { background:rgba(68,170,255,0.1); color:var(--blue); border:1px solid rgba(68,170,255,0.2); }

/* ── BOTTOM BAR ── */
.action-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  height:var(--bar-h);
  background:rgba(10,10,10,0.97);
  border-top:1px solid var(--border);
  backdrop-filter:blur(8px);
  padding:0 10px;
  padding-bottom:env(safe-area-inset-bottom);
  display:flex; align-items:center; gap:6px;
}
.sel-label {
  font-size:10px; color:var(--g-dim); flex:1; min-width:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.sel-label b { color:var(--g); }
.act-btn {
  font-family:var(--font); font-size:11px; font-weight:700;
  letter-spacing:0.08em; text-transform:uppercase;
  padding:0 12px; height:36px; border-radius:3px;
  border:1px solid var(--border); background:var(--bg-card);
  color:var(--g-dim); flex-shrink:0;
  transition:all 0.15s;
}
.act-btn:hover { border-color:var(--border-hi); color:var(--g); background:var(--g-faint); }
.act-btn:active { opacity:0.7; transform:scale(0.97); }
.act-btn:disabled { opacity:0.25; cursor:not-allowed; }
.act-btn.start  { color:var(--g);      border-color:rgba(0,204,68,0.3); }
.act-btn.stop   { color:var(--red);    border-color:rgba(255,64,64,0.3); }
.act-btn.restart{ color:var(--yellow); border-color:rgba(255,170,0,0.3); }
.act-btn.start:hover  { background:rgba(0,204,68,0.1); }
.act-btn.stop:hover   { background:rgba(255,64,64,0.1); }
.act-btn.restart:hover{ background:rgba(255,170,0,0.1); }

/* ── TOAST ── */
#toast {
  position:fixed; top:calc(var(--hdr-h) + 8px); left:50%;
  transform:translateX(-50%) translateY(-8px);
  background:var(--bg-card); border:1px solid var(--border);
  color:var(--g); font-size:11px; padding:6px 14px; border-radius:3px;
  white-space:nowrap; opacity:0; pointer-events:none;
  transition:opacity 0.2s, transform 0.2s;
  z-index:200;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.err  { border-color:var(--red-dim); color:var(--red); }

/* ── EMPTY STATE ── */
.empty { text-align:center; padding:32px; color:var(--g-dim); font-size:12px; }

/* ── PROCESS TABLE ── */
.proc-table-wrap {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:3px;
  overflow:hidden;
}
.proc-table {
  width:100%; border-collapse:collapse;
  font-size:11px; font-family:var(--font);
}
.proc-table thead tr {
  background:rgba(0,204,68,0.06);
  border-bottom:1px solid var(--border);
}
.proc-table th {
  padding:5px 10px; text-align:left;
  font-size:9px; letter-spacing:0.1em; font-weight:700;
  color:var(--g-dim); text-transform:uppercase;
}
.proc-table td {
  padding:5px 10px;
  border-bottom:1px solid rgba(0,204,68,0.05);
  color:var(--g);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.proc-table tbody tr:last-child td { border-bottom:none; }
.proc-table tbody tr:hover { background:var(--g-faint); }
.col-pid  { width:52px; color:var(--g-dim) !important; }
.col-name { max-width:140px; }
.col-cpu, .col-mem { width:60px; text-align:right; }
.cpu-val { font-weight:600; }
.cpu-val.warn  { color:var(--yellow); }
.cpu-val.alert { color:var(--red); }
.mem-val { color:var(--g-dim); }


/* ── LOAD TRIO ── */
.load-trio {
  display:flex; gap:10px; margin:2px 0 4px; align-items:baseline;
}
.load-val {
  font-size:18px; font-weight:700; color:var(--g-bright);
  line-height:1.2;
}

/* ── TABS ── */
.tab-bar {
  display:flex; gap:0; margin-bottom:12px;
  border-bottom:1px solid var(--border);
}
.tab-btn {
  font-family:var(--font); font-size:11px; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase;
  padding:8px 18px; background:transparent; color:var(--g-dim);
  border:none; border-bottom:2px solid transparent;
  margin-bottom:-1px; cursor:pointer;
  transition:color 0.15s, border-color 0.15s;
}
.tab-btn:hover { color:var(--g); }
.tab-btn.active { color:var(--g-bright); border-bottom-color:var(--g); }

/* ── FAN ANIMATION ── */
@keyframes fan-spin { to { transform:rotate(360deg); } }
.fan-icon {
  display:inline-block; line-height:1; vertical-align:middle;
  animation:fan-spin linear infinite;
  animation-play-state:paused;
}

/* ── OLLAMA SECTION ── */
.ollama-list { display:flex; flex-direction:column; gap:5px; }
.ollama-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:3px; padding:8px 12px;
  display:flex; align-items:center; gap:10px;
}
.ollama-dot {
  width:6px; height:6px; border-radius:50%; flex-shrink:0;
  background:var(--g); box-shadow:0 0 6px var(--g);
}
.ollama-name { font-size:13px; color:var(--g); flex:1; }
.ollama-size { font-size:10px; color:var(--g-dim); }
.ollama-empty {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:3px; padding:10px 12px;
  color:var(--g-dim); font-size:11px;
}

/* ── CONTAINER PORTS ── */
.ctr-ports { font-size:10px; color:var(--blue); margin-top:2px; opacity:0.85; }

</style>
</head>
<body>

<header>
  <div class="logo">HOMELAB<span>//</span>CTRL</div>
  <div class="hdr-meta">
    <span class="hdr-chip" id="hdr-host">—</span>
    <span class="hdr-chip" id="hdr-ip">—</span>
    <span class="hdr-chip" id="hdr-up">—</span>
    <span class="hdr-chip" id="hdr-time">—</span>
  </div>
</header>

<main>
  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="server"     onclick="switchTab('server',this)">SERVER</button>
    <button class="tab-btn"        data-tab="containers" onclick="switchTab('containers',this)">CONTAINERS</button>
  </div>

  <!-- ═══════════ SERVER TAB ═══════════ -->
  <div id="tab-server" class="tab-pane">

    <!-- System -->
    <div class="sec-label">system</div>
    <div class="stat-grid" id="stat-grid"><!-- filled by JS --></div>

    <!-- Network -->
    <div class="sec-label">network</div>
    <div class="net-row">
      <div class="net-item">
        <span class="net-label">TX<span class="net-arrow"> ▲</span></span>
        <span class="net-val" id="net-tx">—</span>
      </div>
      <div class="net-item">
        <span class="net-label">RX<span class="net-arrow"> ▼</span></span>
        <span class="net-val" id="net-rx">—</span>
      </div>
    </div>

    <!-- GPU (hidden until stats confirm GPU present) -->
    <div class="sec-label" id="gpu-label" style="display:none">gpu</div>
    <div id="gpu-section" style="display:none">
      <div class="stat-grid" id="gpu-grid"></div>
    </div>

    <!-- Ollama (shown only when OLLAMA feature is enabled) -->
    <div class="sec-label" id="ollama-label" style="display:none">ollama</div>
    <div id="ollama-section" style="display:none">
      <div class="ollama-list" id="ollama-list"></div>
    </div>

    <!-- AdGuard -->
    <div class="sec-label" id="ag-label" style="display:none">adguard</div>
    <div class="ag-row" id="ag-row" style="display:none"></div>

    <!-- Shelly Plug 1 -->
    <div class="sec-label" id="shelly-label" style="display:none">shelly plug</div>
    <div class="shelly-row" id="shelly-row" style="display:none"></div>
    <button class="btn-cycle" id="btn-cycle" style="display:none" onclick="shellyCycle()">⟳ POWER CYCLE</button>

    <!-- Shelly Plug 2 (Router) -->
    <div class="sec-label" id="shelly2-label" style="display:none">router</div>
    <div class="shelly-row" id="shelly2-row" style="display:none"></div>
    <button class="btn-cycle2" id="btn-cycle-2" style="display:none" onclick="shellyCycle2()">⏻ ROUTER CYCLE</button>

    <!-- Storage -->
    <div class="sec-label">storage</div>
    <div class="stor-list" id="stor-list"></div>

    <!-- Processes -->
    <div class="sec-label">top processes</div>
    <div class="proc-table-wrap">
      <table class="proc-table" id="proc-table">
        <thead>
          <tr>
            <th class="col-pid">PID</th>
            <th class="col-name">NAME</th>
            <th class="col-cpu">CPU%</th>
            <th class="col-mem">MEM%</th>
          </tr>
        </thead>
        <tbody id="proc-tbody">
          <tr><td colspan="4" class="empty">loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Wake-on-LAN (shown only when WOL feature is enabled) -->
    <div class="sec-label" id="wol-label" style="display:none">wake on LAN</div>
    <div id="wol-section" style="display:none">
      <div class="wol-card" style="background:var(--bg-card); border:1px solid var(--border); border-radius:3px; padding:8px 10px;">
        <div class="ag-item">
          <span class="ag-label">TARGET MAC</span>
          <span id="wol-mac" style="color:var(--g-dim)">—</span>
        </div>
        <div class="ag-item">
          <span class="ag-label">BROADCAST IP</span>
          <span id="wol-broadcast-ip" style="color:var(--g)"></span>
        </div>
        <div class="ag-item">
          <span class="ag-label">TARGET IP</span>
          <span id="wol-target-ip" style="color:var(--g-dim)">—</span>
        </div>
        <div class="ag-item">
          <span class="ag-label">PORT</span>
          <span id="wol-port" style="color:var(--g-dim)">—</span>
        </div>
      </div>
      <div style="margin-top:8px; display:flex; align-items:center; gap:10px;">
        <button class="btn-cycle2" id="btn-wol-toggle" onclick="toggleWOL()" disabled>⚡ WAKE TARGET</button>
        <button class="btn-cycle2" id="btn-shutdown"   onclick="powerOff()"  disabled>POWER OFF</button>
      </div>
    </div>

  </div><!-- /#tab-server -->

  <!-- ═══════════ CONTAINERS TAB ═══════════ -->
  <div id="tab-containers" class="tab-pane" style="display:none">
    <div class="sec-label">
      containers <span id="ctr-count" style="font-weight:400;text-transform:none;letter-spacing:0"></span>
    </div>
    <div class="ctr-filter">
      <button class="filter-btn active" data-filter="all"     onclick="setFilter('all',this)">ALL</button>
      <button class="filter-btn"        data-filter="running" onclick="setFilter('running',this)">RUNNING</button>
      <button class="filter-btn"        data-filter="exited"  onclick="setFilter('exited',this)">STOPPED</button>
    </div>
    <div class="ctr-list" id="ctr-list"></div>
  </div><!-- /#tab-containers -->

</main>

<!-- Bottom action bar (containers tab only) -->
<div class="action-bar" id="action-bar" style="display:none">
  <div class="sel-label" id="sel-label">tap a container to select</div>
  <button class="act-btn start"   id="btn-start"   disabled onclick="doAction('start')">▶ Start</button>
  <button class="act-btn stop"    id="btn-stop"    disabled onclick="doAction('stop')">■ Stop</button>
  <button class="act-btn restart" id="btn-restart" disabled onclick="doAction('restart')">↺ Restart</button>
</div>

<div id="toast"></div>

<script>

// ── feature flags ─────────────────────────────────────────────────────────────
let _features = { wol:false, shelly:false, shelly2:false, adguard:false, ollama:false };

async function fetchFeatures() {
  try { _features = await fetch('/api/features').then(r => r.json()); } catch(e) {}
  // WOL
  if (_features.wol) {
    document.getElementById('wol-label').style.display   = 'flex';
    document.getElementById('wol-section').style.display = 'block';
    initWoL();
  }
  // Ollama
  if (_features.ollama) {
    document.getElementById('ollama-label').style.display   = 'flex';
    document.getElementById('ollama-section').style.display = 'block';
    fetchOllama();
    setInterval(fetchOllama, 10000);
  }
  // Feature-gated polls
  if (_features.adguard) { fetchAdGuard(); setInterval(fetchAdGuard, 15000); }
  if (_features.shelly)  { fetchShelly();  setInterval(fetchShelly,   5000); }
  if (_features.shelly2) { fetchShelly2(); setInterval(fetchShelly2,  5000); }
}

// ── tab switching ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).style.display = 'block';
  btn.classList.add('active');
  const bar = document.getElementById('action-bar');
  const onContainers = name === 'containers';
  bar.style.display = onContainers ? 'flex' : 'none';
  document.body.style.paddingBottom = onContainers
    ? 'calc(var(--bar-h) + env(safe-area-inset-bottom))' : '12px';
  try { localStorage.setItem('activeTab', name); } catch(e) {}
}

// Restore saved tab on load
(function() {
  try {
    const saved = localStorage.getItem('activeTab');
    if (saved === 'containers') {
      const btn = document.querySelector('.tab-btn[data-tab="containers"]');
      if (btn) switchTab('containers', btn);
    }
  } catch(e) {}
})();

// ── shelly plug 2 ─────────────────────────────────────────────────────────────
async function fetchShelly2() {
  if (!_features.shelly2) return;
  try {
    const d = await fetch('/api/shelly2').then(r => r.json());
    const row = document.getElementById('shelly2-row');
    const lbl = document.getElementById('shelly2-label');
    const btn = document.getElementById('btn-cycle-2');
    if (d.error) {
      row.style.display = 'none'; lbl.style.display = 'none'; btn.style.display = 'none';
      return;
    }
    row.style.display = 'flex'; lbl.style.display = 'flex'; btn.style.display = 'inline-block';
    btn.disabled = false;
    row.innerHTML = `
      <div class="ag-item">
        <span class="ag-label">STATE</span>
        <span class="ag-val" style="color:${d.output ? 'var(--g-bright)' : 'var(--red)'}">
          ${d.output ? 'ON' : 'OFF'}
        </span>
      </div>`;
  } catch(e) { /* ignore */ }
}

// ── power cycle (router) ─────────────────────────────────────────────────────
let _cycleArmed2 = false,
    _cycleTimeout2 = null,
    _cycleRemaining2 = 8,
    _cycleTimerInterval2 = null;

async function shellyCycle2() {
  const btn = document.getElementById('btn-cycle-2');
  if (!_cycleArmed2) {
    // First press – arm and start countdown
    _cycleArmed2 = true;
    _cycleRemaining2 = 8;
    btn.textContent = `⚠ CONFIRM? (${_cycleRemaining2}s)`;
    btn.classList.add('armed');

    _cycleTimerInterval2 = setInterval(() => {
      _cycleRemaining2--;
      if (_cycleRemaining2 <= 0) {
        clearInterval(_cycleTimerInterval2);
        _cycleTimerInterval2 = null;
        _cycleArmed2 = false;
        btn.textContent = '⏻ ROUTER CYCLE';
        btn.classList.remove('armed');
      } else {
        btn.textContent = `⚠ CONFIRM? (${_cycleRemaining2}s)`;
      }
    }, 1000);

    _cycleTimeout2 = setTimeout(() => {
      clearInterval(_cycleTimerInterval2);
      _cycleTimerInterval2 = null;
      _cycleArmed2 = false;
      btn.textContent = '⏻ ROUTER CYCLE';
      btn.classList.remove('armed');
    }, 8000);
  } else {
    // Second press – cancel countdown and perform action
    clearTimeout(_cycleTimeout2);
    if (_cycleTimerInterval2) {
      clearInterval(_cycleTimerInterval2);
      _cycleTimerInterval2 = null;
    }
    _cycleArmed2 = false;
    btn.classList.remove('armed');
    btn.disabled = true;
    btn.textContent = 'Cycling…';
    fetch('/api/shelly2/powercycle', { method: 'POST' })
      .then(r => r.json())
      .then(d => {
        btn.textContent = d.ok ? '✓ on in 10 s' : ('✗ ' + (d.detail || 'failed'));
        setTimeout(() => { btn.textContent = '⏻ ROUTER CYCLE'; btn.disabled = false; }, 15000);
      })
      .catch(() => {
        btn.textContent = '✗ error';
        setTimeout(() => { btn.textContent = '⏻ ROUTER CYCLE'; btn.disabled = false; }, 3000);
      });
  }
}


// ── wake-on-LAN ───────────────────────────────────────────────────────────────
let _wolBusy = false;

async function toggleWOL() {
  const btn = document.getElementById('btn-wol-toggle');
  if (_wolBusy) return;
  _wolBusy = true; btn.textContent = '⏳ WAKING…'; btn.disabled = true;
  try {
    const r = await fetch(`/api/wol/${window.targetIP}`, { method: 'POST' });
    if (r.ok) {
      const d = await r.json();
      toast(`WoL sent — ${d.msg}`);
      btn.textContent = d.target_on ? 'TARGET ON' : '⚡ WAKE TARGET';
    } else {
      const err = await r.json().catch(() => ({}));
      toast(`error: ${err.detail || r.status}`, true);
      btn.textContent = '⚡ WAKE TARGET';
    }
  } catch(e) { toast('network error', true); btn.textContent = '⚡ WAKE TARGET'; }
  finally { _wolBusy = false; btn.disabled = false; }
}

async function initWoL() {
  try {
    const config = await fetch('/api/wol/config').then(r => r.json());
    document.getElementById('wol-mac').textContent          = config.target_mac   || '—';
    document.getElementById('wol-broadcast-ip').textContent = config.broadcast_ip || '';
    document.getElementById('wol-port').textContent         = config.port;
    document.getElementById('wol-target-ip').textContent    = config.target_ip    || '—';
    window.targetIP = config.target_ip;
    if (config.target_mac && config.broadcast_ip) {
      document.getElementById('btn-wol-toggle').disabled = false;
      core.WOL_TARGET_MAC   = config.target_mac;
      core.WOL_BROADCAST_IP = config.broadcast_ip;
    }
    if (config.target_ip) document.getElementById('btn-shutdown').disabled = false;
  } catch(e) { console.error('WoL config error:', e); }
}

async function askPassword(message) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    Object.assign(overlay.style, {
      position:'fixed', top:'0', left:'0', width:'100%', height:'100%',
      backgroundColor:'rgba(0,0,0,0.7)', display:'flex',
      alignItems:'center', justifyContent:'center', zIndex:'1000'
    });
    const box = document.createElement('div');
    Object.assign(box.style, {
      background:'var(--bg-card)', border:'1px solid var(--border)',
      padding:'20px', borderRadius:'4px', color:'var(--g)', minWidth:'300px'
    });
    const lbl = document.createElement('label');
    lbl.textContent = message; lbl.style.cssText = 'display:block;margin-bottom:8px';
    const inp = document.createElement('input'); inp.type = 'password';
    Object.assign(inp.style, { width:'100%', padding:'6px', boxSizing:'border-box',
      background:'var(--bg)', border:'1px solid var(--border)',
      color:'var(--g)', fontFamily:'var(--font)', borderRadius:'2px' });
    const ok  = document.createElement('button'); ok.textContent  = 'OK';     ok.style.cssText = 'margin-right:10px;margin-top:8px';
    const can = document.createElement('button'); can.textContent = 'Cancel';
    box.append(lbl, inp, ok, can); overlay.appendChild(box); document.body.appendChild(overlay); inp.focus();
    inp.addEventListener('keyup', e => { if(e.key==='Enter') ok.click(); if(e.key==='Escape') can.click(); });
    const cleanup = () => overlay.parentNode?.removeChild(overlay);
    ok.onclick  = () => { cleanup(); resolve(inp.value); };
    can.onclick = () => { cleanup(); resolve(null); };
  });
}

async function powerOff() {
  const btn = document.getElementById('btn-shutdown');
  if (!window.targetIP) return;
  const pwd = await askPassword('Enter sudo password for shutdown:');
  if (pwd === null) return;
  btn.disabled = true;
  try {
    const r = await fetch(`/api/shutdown/${window.targetIP}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pwd })
    });
    if (r.ok) { toast('Shutdown command sent'); }
    else { const err = await r.json().catch(()=>({})); toast(`error: ${err.detail || r.status}`, true); }
  } catch(e) { toast('network error', true); }
  finally { btn.disabled = false; }
}


// ── state ────────────────────────────────────────────────────────────────────
const core = { WOL_TARGET_MAC: null, WOL_BROADCAST_IP: null };
let selected = null, containers = [], ctrFilter = 'all', busy = false;

// Power‑cycle button state
let _cycleArmed = false,
    _cycleTimeout = null,
    _cycleRemaining = 8,          // seconds left for confirmation
    _cycleTimerInterval = null;   // interval id for live countdown
function shellyCycle() {
  const btn = document.getElementById('btn-cycle');
  if (!_cycleArmed) {
    // First press – arm the button and start countdown
    _cycleArmed = true;
    _cycleRemaining = 8;
    btn.textContent = `⚠ CONFIRM? (${_cycleRemaining}s)`;
    btn.classList.add('armed');

    // Update every second
    _cycleTimerInterval = setInterval(() => {
      _cycleRemaining--;
      if (_cycleRemaining <= 0) {
        clearInterval(_cycleTimerInterval);
        _cycleTimerInterval = null;
        _cycleArmed = false;
        btn.textContent = '⟳ POWER CYCLE';
        btn.classList.remove('armed');
      } else {
        btn.textContent = `⚠ CONFIRM? (${_cycleRemaining}s)`;
      }
    }, 1000);

    // Also keep the original timeout to reset after 8 s
    _cycleTimeout = setTimeout(() => {
      clearInterval(_cycleTimerInterval);
      _cycleTimerInterval = null;
      _cycleArmed = false;
      btn.textContent = '⟳ POWER CYCLE';
      btn.classList.remove('armed');
    }, 8000);
  } else {
    // Second press – cancel countdown and perform action
    clearTimeout(_cycleTimeout);
    if (_cycleTimerInterval) {
      clearInterval(_cycleTimerInterval);
      _cycleTimerInterval = null;
    }
    _cycleArmed = false;
    btn.classList.remove('armed');
    btn.disabled = true;
    btn.textContent = 'Cycling…';
    fetch('/api/shelly/powercycle', { method: 'POST' })
      .then(r => r.json())
      .then(d => {
        btn.textContent = d.ok ? '✓ on in 10 s' : ('✗ ' + (d.detail || 'failed'));
        setTimeout(() => { btn.textContent = '⟳ POWER CYCLE'; btn.disabled = false; }, 15000);
      })
      .catch(() => {
        btn.textContent = '✗ error';
        setTimeout(() => { btn.textContent = '⟳ POWER CYCLE'; btn.disabled = false; }, 3000);
      });
  }
}

// ── helpers ──────────────────────────────────────────────────────────────────
const fmtBytes = b => {
  if (b < 1024)     return b.toFixed(0)  + ' B/s';
  if (b < 1048576)  return (b/1024).toFixed(1) + ' KB/s';
  return (b/1048576).toFixed(1) + ' MB/s';
};

const pctClass = p => p >= 85 ? 'alert' : p >= 65 ? 'warn' : '';

function bar(pct) {
  const cls = pctClass(pct);
  return `<div class="pbar"><div class="pbar-fill ${cls}" style="width:${pct}%"></div></div>`;
}

let toastTimer;
function toast(msg, isErr=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2400);
}

// ── clock ────────────────────────────────────────────────────────────────────
function tick() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('hdr-time').textContent = `${hh}:${mm}:${ss}`;
}
setInterval(tick, 1000); tick();

// ── fetch stats ───────────────────────────────────────────────────────────────
async function fetchStats() {
  try {
    const d = await fetch('/api/stats').then(r => r.json());
    document.getElementById('hdr-host').textContent = d.hostname;
    window.currentHost = d.hostname;
    document.getElementById('hdr-ip').textContent = d.ip;
    document.getElementById('hdr-up').textContent = d.uptime;
    document.getElementById('net-tx').textContent = fmtBytes(d.net_tx);
    document.getElementById('net-rx').textContent = fmtBytes(d.net_rx);

    const items = [
      { label:'CPU',  val: d.cpu.toFixed(1)+'%',      pct: d.cpu,      sub: '' },
      { label:'RAM',  val: d.ram_pct.toFixed(1)+'%',  pct: d.ram_pct,  sub: `${d.ram_used_gb}/${d.ram_total_gb} GB` },
      { label:'SWAP', val: d.swap_pct.toFixed(1)+'%', pct: d.swap_pct, sub: '' },
      { label:'LOAD', val: null, load: [d.load1, d.load5, d.load15], pct: null, sub: '' },
    ];
    if (d.temp !== null) {
      const tCls = d.temp >= 80 ? 'alert' : d.temp >= 65 ? 'warn' : '';
      items.splice(3, 0, { label:'TEMP', val: d.temp+'°C', pct:null, cls:tCls, sub:'' });
    }

    document.getElementById('stat-grid').innerHTML = items.map(it => {
      if (it.load) return `<div class="stat-card">
        <div class="stat-label">${it.label}</div>
        <div class="load-trio">
          <span class="load-val">${it.load[0]}</span>
          <span class="load-val">${it.load[1]}</span>
          <span class="load-val">${it.load[2]}</span>
        </div>
        <div class="stat-sub">1m &nbsp; 5m &nbsp; 15m</div>
      </div>`;
      const cls = it.cls || (it.pct !== null ? pctClass(it.pct) : '');
      return `<div class="stat-card">
        <div class="stat-label">${it.label}</div>
        <div class="stat-val ${cls}">${it.val}</div>
        ${it.pct !== null ? bar(it.pct) : ''}
        <div class="stat-sub">${it.sub}</div>
      </div>`;
    }).join('');

    renderGpu(d.gpu);
  } catch(e) { /* ignore */ }
}

// ── GPU rendering + fan animation ─────────────────────────────────────────────
function renderGpu(gpu) {
  const lbl  = document.getElementById('gpu-label');
  const sec  = document.getElementById('gpu-section');
  const grid = document.getElementById('gpu-grid');
  if (!gpu) { lbl.style.display = 'none'; sec.style.display = 'none'; return; }
  lbl.style.display = 'flex'; sec.style.display = 'block';

  const items = [];
  if (gpu.usage   !== null) items.push({ label:'GPU USE', val: gpu.usage+'%',  pct: gpu.usage, sub: 'processing' });
  if (gpu.temp    !== null) {
    const tCls = gpu.temp >= 90 ? 'alert' : gpu.temp >= 75 ? 'warn' : '';
    items.push({ label:'TEMP', val: gpu.temp+'°C', pct: null, cls: tCls, sub: '' });
  }
  if (gpu.fan_pct !== null) items.push({ label:'FAN', isFan: true, fan_pct: gpu.fan_pct, fan_rpm: gpu.fan_rpm });
  if (gpu.power_w !== null) items.push({ label:'POWER', val: gpu.power_w+'W', pct: null, sub: '' });

  grid.innerHTML = items.map(it => {
    if (it.isFan) return `<div class="stat-card">
      <div class="stat-label">FAN</div>
      <div class="stat-val" style="display:flex;align-items:center;gap:6px">
        <svg id="fan-icon" class="fan-icon" viewBox="0 0 32 32" width="20" height="20" fill="currentColor">
          <ellipse cx="16" cy="9" rx="4" ry="8" transform="rotate(0,16,16)"/>
          <ellipse cx="16" cy="9" rx="4" ry="8" transform="rotate(120,16,16)"/>
          <ellipse cx="16" cy="9" rx="4" ry="8" transform="rotate(240,16,16)"/>
          <circle cx="16" cy="16" r="3.5" fill="var(--bg)"/>
          <circle cx="16" cy="16" r="2" fill="currentColor"/>
        </svg>
        ${it.fan_pct !== null ? it.fan_pct.toFixed(0)+'%' : '—'}
      </div>
      <div class="stat-sub">${it.fan_rpm !== null ? it.fan_rpm+' RPM' : ''}</div>
    </div>`;
    const cls = it.cls || (it.pct !== null ? pctClass(it.pct) : '');
    return `<div class="stat-card">
      <div class="stat-label">${it.label}</div>
      <div class="stat-val ${cls}">${it.val}</div>
      ${it.pct !== null ? bar(it.pct) : ''}
      <div class="stat-sub">${it.sub||''}</div>
    </div>`;
  }).join('');

  const fanIcon = document.getElementById('fan-icon');
  if (fanIcon && gpu.fan_pct !== null) {
    if (gpu.fan_pct > 0) {
      fanIcon.style.animationDuration  = Math.max(0.2, 4.5 - (gpu.fan_pct / 100) * 4.2) + 's';
      fanIcon.style.animationPlayState = 'running';
    } else {
      fanIcon.style.animationPlayState = 'paused';
    }
  }
}

// ── fetch ollama ──────────────────────────────────────────────────────────────
async function fetchOllama() {
  if (!_features.ollama) return;
  try {
    const models = await fetch('/api/ollama').then(r => r.json());
    const list = document.getElementById('ollama-list');
    list.innerHTML = models.length
      ? models.map(m => `<div class="ollama-card"><span class="ollama-dot"></span><span class="ollama-name">${escHtml(m.name)}</span><span class="ollama-size">${m.size_gb} GB</span></div>`).join('')
      : '<div class="ollama-empty">no model loaded</div>';
  } catch(e) { /* ignore */ }
}

// ── fetch storage ─────────────────────────────────────────────────────────────
async function fetchStorage() {
  try {
    const data = await fetch('/api/storage').then(r => r.json());
    const list = document.getElementById('stor-list');
    const nfsOnly = data.filter(s => s.type === 'NFS');
    list.innerHTML = nfsOnly.map(s => {
      if (s.error) return `<div class="stor-row">
        <div class="stor-top">
          <span class="stor-mount">${escHtml(s.mount)}</span>
          <span class="stor-error">${escHtml(s.error)}</span>
        </div></div>`;
      const cls = pctClass(s.percent);
      return `<div class="stor-row">
        <div class="stor-top">
          <span class="stor-mount">${escHtml(s.mount)}</span>
          <span class="stor-info">${s.used_gb} / ${s.total_gb} GB — ${s.percent}%</span>
        </div>
        <div class="pbar"><div class="pbar-fill ${cls}" style="width:${s.percent}%"></div></div>
      </div>`;
    }).join('');
  } catch(e) { /* ignore */ }
}

// ── fetch adguard ─────────────────────────────────────────────────────────────
async function fetchAdGuard() {
  if (!_features.adguard) return;
  try {
    const d = await fetch('/api/adguard').then(r => r.json());
    const row = document.getElementById('ag-row');
    const lbl = document.getElementById('ag-label');
    if (d.error) { row.style.display='none'; lbl.style.display='none'; return; }
    row.style.display = 'flex'; lbl.style.display = 'flex';
    row.innerHTML = [
      { label:'AVG',     val: d.avg_ms+'ms' },
      { label:'QUERIES', val: d.queries.toLocaleString() },
      { label:'BLOCKED', val: d.blocked.toLocaleString() },
      { label:'BLOCK%',  val: d.blocked_pct+'%' },
    ].map(i => `<div class="ag-item"><span class="ag-label">${i.label}</span><span class="ag-val">${i.val}</span></div>`).join('');
  } catch(e) { /* ignore */ }
}

// ── fetch shelly plug ─────────────────────────────────────────────────────────
async function fetchShelly() {
  if (!_features.shelly) return;
  try {
    const d = await fetch('/api/shelly').then(r => r.json());
    const row = document.getElementById('shelly-row');
    const lbl = document.getElementById('shelly-label');
    const btn = document.getElementById('btn-cycle');
    if (d.error) { row.style.display='none'; lbl.style.display='none'; btn.style.display='none'; return; }
    row.style.display = 'flex'; lbl.style.display = 'flex'; btn.style.display = 'inline-block';
    const pwrPct = Math.min(100, (d.apower / 2300) * 100).toFixed(1);
    const pwrCls = d.apower >= 2000 ? 'alert' : d.apower >= 1000 ? 'warn' : '';
    const todayRow = d.today_kwh !== null
      ? `<div class="ag-item"><span class="ag-label">TODAY</span><span class="ag-val" style="color:var(--g-bright)">${d.today_kwh.toFixed(4)} kWh</span></div>` : '';
    const ydayRow = (d.yesterday_kwh !== null && d.yesterday_date)
      ? `<div class="ag-item"><span class="ag-label">YDAY (${d.yesterday_date.slice(-5)})</span><span class="ag-val" style="color:var(--g-dim)">${d.yesterday_kwh.toFixed(4)} kWh</span></div>` : '';
    row.innerHTML = `
      <div class="ag-item">
        <span class="ag-label">STATE</span>
        <span class="ag-val" style="color:${d.output ? 'var(--g-bright)' : 'var(--red)'}">${d.output ? 'ON' : 'OFF'}</span>
      </div>
      <div class="shelly-power">
        <span class="ag-label">POWER</span>
        <span class="ag-val ${pwrCls}">${d.apower} W</span>
        <div class="pbar"><div class="pbar-fill ${pwrCls}" style="width:${pwrPct}%"></div></div>
      </div>
      <div class="ag-item"><span class="ag-label">VOLTAGE</span><span class="ag-val">${d.voltage} V</span></div>
      <div class="ag-item"><span class="ag-label">CURRENT</span><span class="ag-val">${d.current} A</span></div>
      ${todayRow}${ydayRow}`;
  } catch(e) { /* ignore */ }
}

// ── fetch containers ──────────────────────────────────────────────────────────
async function fetchContainers() {
  try {
    const data = await fetch('/api/containers').then(r=>r.json());
    containers = data;

    // keep selected valid
    if (selected) {
      const still = containers.find(c => c.id === selected.id);
      if (still) { selected = still; } else { selected = null; }
    }

    renderContainers();
    updateActionBar();

    const cnt = containers.filter(c=>c.state==='running').length;
    document.getElementById('ctr-count').textContent =
      `— ${containers.length} total · ${cnt} running`;
  } catch(e) { /* ignore */ }
}

function renderContainers() {
  const list = document.getElementById('ctr-list');
  const filtered = ctrFilter === 'all' ? containers :
    containers.filter(c => {
      if (ctrFilter==='running') return c.state==='running';
      if (ctrFilter==='exited')  return c.state!=='running';
      return true;
    });

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">no containers found</div>';
    return;
  }

  // sort: running first, then alpha
  const sorted = [...filtered].sort((a,b) => {
    if (a.state==='running' && b.state!=='running') return -1;
    if (a.state!=='running' && b.state==='running') return 1;
    return a.name.localeCompare(b.name);
  });

  list.innerHTML = sorted.map(c => {
    const dotCls = c.state==='running'?'running': c.state==='exited'?'exited': c.state==='paused'?'paused':c.state==='created'?'created':'exited';
    const isSel  = selected && selected.id === c.id;
    const portsHtml = c.ports && c.ports.length
      ? `<div class="ctr-ports">${c.ports.map(p => escHtml(p)).join(' · ')}</div>` : '';
    return `<div class="ctr-card ${isSel?'selected':''}" onclick="selectContainer('${c.id}')">
      <span class="ctr-dot ${dotCls}"></span>
      <div class="ctr-info">
        <div class="ctr-name">${escHtml(c.name)}</div>
        <div class="ctr-meta">${escHtml(c.host)} · ${escHtml(c.status)}</div>
        ${portsHtml}
      </div>
      <span class="ctr-badge ${dotCls}">${c.state==='running'?'UP':c.state==='exited'?'DOWN':c.state.toUpperCase()}</span>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setFilter(f, btn) {
  ctrFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderContainers();
}

function selectContainer(id) {
  const c = containers.find(x=>x.id===id);
  if (!c) return;
  selected = (selected && selected.id===id) ? null : c;
  renderContainers();
  updateActionBar();
}

function updateActionBar() {
  const lbl = document.getElementById('sel-label');
  const btnStart   = document.getElementById('btn-start');
  const btnStop    = document.getElementById('btn-stop');
  const btnRestart = document.getElementById('btn-restart');

  if (!selected) {
    lbl.innerHTML = 'tap a container to select';
    btnStart.disabled = btnStop.disabled = btnRestart.disabled = true;
    return;
  }
  const running = selected.state === 'running';
  lbl.innerHTML = `<b>${escHtml(selected.name)}</b> · ${selected.host}`;
  btnStart.disabled   = running   || busy;
  btnStop.disabled    = !running  || busy;
  btnRestart.disabled = !running  || busy;
}

async function doAction(action) {
  if (!selected || busy) return;
  busy = true;
  updateActionBar();
  const eid = selected.eid ?? 'null';
  try {
    const r = await fetch(`/api/containers/${eid}/${selected.id}/${action}`, { method:'POST' });
    if (r.ok) {
      toast(`${action} → ${selected.name}`);
    } else {
      const err = await r.json().catch(()=>({}));
      toast(`error: ${err.detail || r.status}`, true);
    }
  } catch(e) {
    toast(`network error`, true);
  }
  busy = false;
  // refresh containers quickly
  setTimeout(fetchContainers, 600);
  setTimeout(fetchContainers, 2000);
}


// ── fetch processes ───────────────────────────────────────────────────────────
async function fetchProcesses() {
  try {
    const data = await fetch('/api/processes').then(r=>r.json());
    const tbody = document.getElementById('proc-tbody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">no data</td></tr>';
      return;
    }
    tbody.innerHTML = data.slice(0, 5).map(p => {
      const cpu = (p.cpu_percent || 0).toFixed(1);
      const mem = (p.memory_percent || 0).toFixed(1);
      const cpuCls = p.cpu_percent >= 50 ? 'alert' : p.cpu_percent >= 20 ? 'warn' : '';
      return `<tr>
        <td class="col-pid" style="color:var(--g-dim)">${p.pid}</td>
        <td class="col-name">${escHtml(p.name)}</td>
        <td class="col-cpu"><span class="cpu-val ${cpuCls}">${cpu}</span></td>
        <td class="col-mem"><span class="mem-val">${mem}</span></td>
      </tr>`;
    }).join('');
  } catch(e) { /* ignore */ }
}

// ── polling ───────────────────────────────────────────────────────────────────
fetchFeatures(); // kicks off feature-gated polls (Shelly/AdGuard/Ollama/WoL)
fetchStats();
fetchStorage();
fetchContainers();
fetchProcesses();

setInterval(fetchStats,      2000);
setInterval(fetchContainers, 3000);
setInterval(fetchStorage,    8000);
setInterval(fetchProcesses,  3000);
</script>
</body>
